worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Gzip compression ────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 256;

    # ── Rate limiting zone ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name www.themoonexports.com;

        # ── Security headers ────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API reverse proxy ───────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # CORS headers
            add_header Access-Control-Allow-Origin "https://www.themoonexports.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, X-CSRF-Token" always;

            # Handle CORS preflight (safe if-use: only returns status, no proxy)
            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check passthrough ────────────────────────────
        location /healthz {
            proxy_pass http://backend:3000;
        }

        # ── Metrics (internal only) ─────────────────────────────
        location /metrics {
            proxy_pass http://backend:3000;
            allow 127.0.0.1;
            deny all;
        }
    }
}
